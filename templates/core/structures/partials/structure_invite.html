{%include 'show_message.html'%}
{% load custom_tags %}

<div id="structure-invite-form">
    <form hx-post="{% url 'core:structure-invite' structure_pk %}"
            hx-target="#structure-invite-form"
            hx-swap="innerHTML">

        <h2>Inviter un utilisateur</h2>

        <label for="role"> Role</label>
        <select id="role" class="form-select" name="role">
            <option selected>--- Sélectionnez un rôle ---</option>>
            {%for role in roles%}
                <option value="{{role.0}}" {% if role.0 == defaults.role %}selected{% endif %}>{{role.1}}</option>>
            {%endfor%}
        </select>
        {% if errors.role %}
            <p class="error">{{errors.role.0}}</p>
        {% endif %}

        <label for="email"> Email</label>
        <input type="email" id="email" class="form-control mt-2" placeholder='Email' name="email" value="{{ defaults.email }}"/>
        {% if errors.email %}
            <p class="error">{{errors.email.0}}</p>
        {% endif %}

        <hr>

        <button class="btn btn-primary">Envoyer</button>

        <button class="btn btn-danger" onclick="{% popup_close %}" type="button">Annuler</button>
    </form>
</div>
